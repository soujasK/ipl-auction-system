services:
  - type: web
    name: ipl-auction-quotation-system
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ipl-auction-db
          property: connectionString

databases:
  - name: ipl-auction-db
    plan: free
